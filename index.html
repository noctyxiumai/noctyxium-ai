<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium AI</title><style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#0f1115;
  color:#e4e4e4;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar{
  background:#12141a;
  border-bottom:1px solid #1f222b;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

.logo span{color:#ff3b3b;font-weight:bold;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#12141a;
  padding:12px;
  transition:0.3s;
  z-index:1000;
  overflow:auto;
}

.sidebar.active{left:0;}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

.overlay.active{display:block;}

.prompt{
  background:#1a1d25;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  cursor:pointer;
}

.prompt:hover{
  background:#252a35;
  border:1px solid #ff3b3b;
}

/* CHAT */
.chat-header{
  text-align:center;
  color:#ff3b3b;
  padding:10px;
}

.top-actions{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  padding:8px 12px;
  border-radius:8px;
  background:#1a1d25;
  border:1px solid #333;
  cursor:pointer;
}

.chat-box{
  padding:10px;
  height:75vh;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:12px;
}
</style></head><body><div class="navbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><span>Noctyxium AI</span></div>
</div><div class="sidebar" id="sidebar"><h2>🎬 Explore Stories</h2><div class="prompt" onclick="copyPrompt('3AM mirror entity horror story')">Mirror Entity</div>
<div class="prompt" onclick="copyPrompt('ghost in camera horror')">Camera Ghost</div>
<div class="prompt" onclick="copyPrompt('shadow watching you horror')">Watcher</div><div class="prompt" onclick="randomPrompt()">🎲 Random Story</div><h3>🔥 Netflix Ideas</h3>
<div id="ideas"></div><h3>📖 Blog</h3>
<div class="prompt" onclick="window.location.href='ai-horror-prompts.html'">100+ Prompts</div></div><div class="overlay" id="overlay" onclick="toggleMenu()"></div><div class="chat-header">Generate cinematic stories instantly</div><div class="top-actions">
<button class="btn" onclick="clearChat()">🗑</button>
<button class="btn" onclick="share()">🔗</button>
</div><div class="chat-box">
<iframe id="chatbot" src="https://udify.app/chatbot/sr6l1agghqHaG7e9"></iframe>
</div><script>

/* MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

/* COPY */
function copyPrompt(text){
  navigator.clipboard.writeText(text)
  .then(()=>alert("Copied!"))
  .catch(()=>alert("Copy failed"));
}

/* RANDOM */
function randomPrompt(){
  const arr=[
    "3AM jungle creature horror",
    "AI controlling human brain",
    "lost forest expedition horror",
    "time loop death story"
  ];
  copyPrompt(arr[Math.floor(Math.random()*arr.length)]);
}

/* CLEAR */
function clearChat(){
  let iframe=document.getElementById("chatbot");
  iframe.src = iframe.src.split("?")[0] + "?reload=" + Date.now();
}

/* SHARE */
function share(){
  navigator.clipboard.writeText(location.href);
  alert("Link copied!");
}

/* 🎬 NETFLIX IDEAS */
const IDEAS = [
"Amazon jungle expedition finds humans being hunted by invisible predators",
"Himalayan cave where time reverses and dead explorers return",
"Forest where shadows move without bodies",
"Lost tribe that mimics human voices to hunt victims",
"Jungle parasite that controls animals and humans",
"River showing your future death reflection",
"Forest where memories become real creatures",
"Plane crash survivors replaced by copies",
"Wildlife camera captures unseen entity hunting humans",
"Forest where sound becomes deadly weapon",

"Abandoned research lab releasing unknown jungle creature",
"Jungle where gravity changes randomly",
"Hidden valley where humans are prey species",
"Tree roots absorbing humans alive",
"AI drone discovering unknown lifeform hunting people",

"Forest that erases people from reality",
"Camera recording future deaths",
"Creature living inside reflections",
"Night forest where stars move wrong",
"Jungle storm bringing voices of dead",

"Mirror portal inside cave leading to alternate world",
"Forest virus causing hallucinations that are real",
"Survival team hunted by unseen intelligence",
"Underground bunker hiding failed experiments",
"Forest where time loop removes people one by one",

"AI system controlling entire ecosystem",
"Jungle temple changing structure every night",
"Shadow creature copying human actions",
"Forest lake pulling people into alternate dimension",
"Hidden species evolving faster than humans"
];

/* LOAD IDEAS */
const ideasDiv = document.getElementById("ideas");

IDEAS.forEach(i=>{
  let d=document.createElement("div");
  d.className="prompt";
  d.innerText="🎬 "+i;
  d.onclick=function(){copyPrompt(i)};
  ideasDiv.appendChild(d);
});

</script></body>
</html>
