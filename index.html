<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#f5f6f8;
  color:#222;
}

/* NAVBAR */
.navbar{
  background:#ffffff;
  border-bottom:1px solid #ddd;
  padding:12px;
  display:flex;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{height:28px;}
.logo span{color:#e63946;font-weight:bold;}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#ffffff;
  border-right:1px solid #ddd;
  padding:12px;
  overflow:auto;
}

.sidebar h2{margin-bottom:10px;}
.sidebar h3{margin-top:10px;font-size:12px;color:#666;}

/* PROMPTS */
.prompt{
  background:#f0f2f5;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

.prompt:hover{
  border:1px solid #e63946;
  background:#fff;
}

/* CHAT */
.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:12px;
  text-align:center;
  border-bottom:1px solid #ddd;
  color:#e63946;
}

.top-actions{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.btn{
  padding:8px 12px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}

.btn:hover{
  border-color:#e63946;
}

/* CHAT BOX */
.chat-box{
  flex:1;
  padding:10px;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:10px;
  background:#fff;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">
    <img src="logo.png">
    <span>Noctyxium AI</span>
  </div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h2>🎬 Explore Stories</h2>

<h3>🔥 Horror</h3>
<div class="prompt" onclick="copyPrompt('3AM horror story cinematic')">3AM Horror</div>
<div class="prompt" onclick="copyPrompt('ghost in hospital story')">Hospital Ghost</div>

<h3>🌲 Adventure</h3>
<div class="prompt" onclick="copyPrompt('lost in jungle survival story')">Jungle Survival</div>

<h3>🧠 Mystery</h3>
<div class="prompt" onclick="copyPrompt('unsolved murder mystery')">Murder Mystery</div>

<h3>🚀 Sci-Fi</h3>
<div class="prompt" onclick="copyPrompt('AI becomes evil story')">Evil AI</div>

<div class="prompt" onclick="randomPrompt()">🎲 Random Story</div>

</div>

<!-- CHAT -->
<div class="chat-area">

<div class="chat-header">
Generate cinematic stories instantly
</div>

<div class="top-actions">
<button class="btn" onclick="clearChat()">🗑 Clear</button>
<button class="btn" onclick="share()">🔗 Share</button>
<button class="btn" onclick="downloadText()">⬇ Download</button>
</div>

<div class="chat-box">
<iframe id="chatbot"></iframe>
</div>

</div>

</div>

<script>

/* LOAD CHAT */
function loadChat(){
  document.getElementById("chatbot").src =
  "https://udify.app/chatbot/sr6l1agghqHaG7e9?session="+Date.now();
}
loadChat();

/* COPY PROMPT */
function copyPrompt(text){
  navigator.clipboard.writeText(text);
  alert("Copied:\n"+text+"\nPaste in chat 👇");
}

/* RANDOM */
function randomPrompt(){
  const arr=[
    "dark forest horror story",
    "AI gone evil",
    "ghost in room",
    "alien invasion",
    "time loop mystery"
  ];
  copyPrompt(arr[Math.floor(Math.random()*arr.length)]);
}

/* CLEAR CHAT (BEST POSSIBLE FIX) */
function clearChat(){
  loadChat();
}

/* SHARE */
function share(){
  if(navigator.share){
    navigator.share({title:"Noctyxium AI",url:window.location.href});
  }else{
    alert(window.location.href);
  }
}

/* DOWNLOAD (manual copy helper) */
function downloadText(){
  alert("Long press text in chat → copy → save in notes");
}

</script>

</body>
</html>
