<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium AI</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, rgba(120,0,0,0.1), transparent 40%), #000;
  color:white;
  overflow-x:hidden;
  min-height:100vh;
}

/* 🔥 FIX: content always above fog */
body > * {
  position: relative;
  z-index: 1;
}

/* 🌫️ FOG */
.fog {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.03), transparent 60%);
  animation: fogMove 25s linear infinite;
  z-index:0;
  filter: blur(20px);
}

@keyframes fogMove {
  0% {transform: translate(-20%, -20%)}
  50% {transform: translate(0%, 10%)}
  100% {transform: translate(20%, -10%)}
}

/* 👻 PARTICLES */
.particle {
  position: fixed;
  width: 3px;
  height: 3px;
  background: white;
  opacity: 0.2;
  animation: float 10s infinite linear;
}

@keyframes float {
  0% {transform: translateY(100vh)}
  100% {transform: translateY(-10vh)}
}

/* 🔥 NAVBAR (GLASS STYLE) */
.navbar {
  position: sticky;
  top:0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,0,0,0.2);
  padding: 12px;
  display:flex;
  justify-content: space-between;
  align-items:center;
  z-index:999;
}

/* LOGO */
.logo {
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:bold;
}

.logo img {
  height:35px;
  filter: drop-shadow(0 0 8px red);
  transition:0.3s;
}

.logo img:hover {
  transform: scale(1.1);
}

.logo span {
  color:#ff2a2a;
  text-shadow:0 0 10px rgba(255,0,0,0.5);
}

/* NAV LINKS */
.navbar a {
  color:#ccc;
  margin:5px;
  padding:8px 12px;
  border:1px solid #333;
  border-radius:20px;
  transition:0.3s;
  font-size:0.9rem;
}

.navbar a:hover {
  background: rgba(255,0,0,0.15);
  border-color: red;
  box-shadow:0 0 12px rgba(255,0,0,0.3);
  color:white;
}

/* TITLE */
.title {
  text-align:center;
  font-size:2.2rem;
  margin-top:40px;
  letter-spacing:2px;
  color:#ff0000;
  text-shadow:
    0 0 5px #600,
    0 0 15px red,
    0 0 30px darkred,
    0 0 60px rgba(255,0,0,0.35);
}

/* HERO */
.hero {
  text-align:center;
  margin:20px;
}

.hero p {
  color:#bbb;
}

/* BUTTON */
.btn {
  padding:10px 15px;
  margin:10px;
  background:#111;
  border:1px solid #444;
  border-radius:10px;
  cursor:pointer;
  transition: all 0.3s ease;
}

.btn:hover {
  background:linear-gradient(180deg,#a10000,#650000);
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,0,0,0.4);
}

/* CARDS */
.card {
  background:#111;
  margin:10px;
  padding:15px;
  border-radius:15px;
  border:1px solid #333;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  border-color:red;
  box-shadow:0 0 20px rgba(255,0,0,0.25);
}

/* CHAT */
iframe {
  width:100%;
  height:700px;
  border:none;
  border-radius:15px;
  background:#111;
}

/* SUBTLE SCREEN EFFECT */
body {
  animation: flicker 6s infinite;
}

@keyframes flicker {
  0%,100% {opacity:1;}
  50% {opacity:0.98;}
}

/* MOBILE */
@media(max-width:768px){
  .title {font-size:1.5rem;}
  iframe {height:600px;}
}
</style>
</head>

<body>

<div class="fog"></div>

<script>
for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(p);
}
</script>

<div class="navbar">
  <div class="logo">
    <img src="logo.png" alt="logo">
    <span>Noctyxium AI</span>
  </div>
  <div>
    <a href="#">Home</a>
    <a href="#chat">AI</a>
    <a href="#">About</a>
  </div>
</div>

<h1 class="title">NOCTYXIUM AI HORROR</h1>

<div class="hero">
  <p>Type your fear... if you dare.</p>
  <button class="btn" onclick="scrollToChat()">Open AI</button>
</div>

<div class="card">🎬 Cinematic horror stories</div>
<div class="card">🌍 Multi-language AI</div>
<div class="card">😈 3AM Fear Mode</div>

<div id="chat" style="margin:20px;">
  <iframe src="https://udify.app/chatbot/sr6l1agghqHaG7e9"></iframe>
</div>

<script>
function scrollToChat(){
  document.getElementById("chat").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
