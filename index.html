<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium Ultra Pro</title><style>
body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#ff004c,#ff4d6d);
color:white;
}

/* CHAT */
.chat{
height:55vh;
overflow:auto;
padding:15px;
}

.msg{
margin:12px 0;
padding:14px;
border-radius:15px;
max-width:75%;
line-height:1.5;
}

.user{
background:#ff004c;
margin-left:auto;
}

.bot{
background:#1a1a1a;
border-left:3px solid #ff004c;
}

/* INPUT */
.input-box{
display:flex;
gap:10px;
padding:10px;
background:#111;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

button{
padding:12px;
background:#ff004c;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* IDEAS */
.ideas{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
height:35vh;
overflow:auto;
background:#111;
}

.idea{
padding:12px;
border-radius:12px;
cursor:pointer;
background:#1a1a1a;
transition:0.3s;
}

.idea:hover{
background:#ff004c;
}
</style></head><body><div class="header">🎬 Noctyxium Horror Engine</div><div id="chat" class="chat"></div><div class="input-box">
<input id="input" placeholder="Enter horror idea...">
<button onclick="generate()">Generate</button>
<button onclick="speak()">🔊</button>
</div><div id="ideas" class="ideas"></div><script>
const API_KEY = "PASTE_YOUR_GEMINI_API_KEY";

const SYSTEM = `
You are a cinematic horror generator.

- Netflix style
- Add 3AM
- Dark suspense
- Twist ending
`;

const IDEAS = [
"3AM mirror entity",
"haunted hospital",
"AI gone evil",
"dark forest creature",
"time loop horror",
"shadow watching you",
"abandoned school",
"ghost train",
"dark corridor",
"unknown stalker"
];

const chat=document.getElementById("chat");

function addMsg(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

async function generate(){
let input=document.getElementById("input");
let text=input.value.trim();
if(!text)return;

addMsg(text,"user");
input.value="";

addMsg("Generating horror...","bot");

try{
let res=await fetch(
"https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:SYSTEM+"\nIdea:"+text}]}]
})
}
);

let data=await res.json();

chat.lastChild.remove();

let reply="Error";

if(data.candidates){
reply=data.candidates[0].content.parts.map(p=>p.text).join("");
}

addMsg(reply,"bot");

}catch(e){
chat.lastChild.remove();
addMsg("Error loading AI","bot");
}
}

function speak(){
let text=document.querySelector(".bot:last-child")?.innerText;
if(!text)return;
let speech=new SpeechSynthesisUtterance(text);
speech.rate=0.9;
speechSynthesis.speak(speech);
}

const ideasDiv=document.getElementById("ideas");

IDEAS.forEach(i=>{
let d=document.createElement("div");
d.className="idea";
d.innerText=i;
d.onclick=()=>{document.getElementById("input").value=i};
ideasDiv.appendChild(d);
});
</script></body>
</html>
