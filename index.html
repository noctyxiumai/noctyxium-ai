<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial;
  background:#f5f6f7;
  color:#222;
}

/* NAVBAR */
.navbar{
  background:#fff;
  border-bottom:1px solid #ddd;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:bold;
}

.logo img{height:30px;}
.logo span{color:#e63946;}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:15px;
  overflow:auto;
}

.prompt{
  padding:10px;
  background:#f8f8f8;
  margin-bottom:8px;
  border-radius:6px;
  cursor:pointer;
}

.prompt:hover{
  background:#fff;
  border:1px solid #e63946;
}

/* CHAT */
.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
  color:#e63946;
}

.chat-box{
  flex:1;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* TOP BUTTONS */
.top-actions{
  display:flex;
  gap:10px;
  padding:10px;
  justify-content:center;
}

.btn{
  padding:8px 12px;
  border:1px solid #ddd;
  border-radius:6px;
  cursor:pointer;
  background:#fff;
}

.btn:hover{
  border-color:#e63946;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">
    <img src="logo.png">
    <span>Noctyxium AI</span>
  </div>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Trending Prompts</h3>

    <div class="prompt" onclick="sendPrompt('3AM hospital horror story')">
      3AM hospital horror story
    </div>

    <div class="prompt" onclick="sendPrompt('haunted village story')">
      Haunted village
    </div>

    <div class="prompt" onclick="sendPrompt('ghost in railway station')">
      Railway ghost
    </div>

    <div class="prompt" onclick="randomPrompt()">
      🎲 Random Story
    </div>

  </div>

  <!-- CHAT -->
  <div class="chat-area">

    <div class="chat-header">
      Generate cinematic horror stories instantly
    </div>

    <!-- ACTION BUTTONS -->
    <div class="top-actions">
      <button class="btn" onclick="share()">🔗 Share</button>
      <button class="btn" onclick="toggleMode()">🌙 Toggle Mode</button>
      <button class="btn" onclick="alert('3AM Mode Activated 😈')">⏰ 3AM Mode</button>
    </div>

    <div class="chat-box">
      <iframe id="chatbot" src="https://udify.app/chatbot/sr6l1agghqHaG7e9"></iframe>
    </div>

  </div>

</div>

<script>

/* PROMPT CLICK (LIMITED) */
function sendPrompt(text){
  alert("👉 Copy this prompt:\n\n" + text);
}

/* RANDOM */
function randomPrompt(){
  const list = [
    "3AM horror story",
    "ghost in hospital",
    "creepy forest",
    "haunted train"
  ];
  const random = list[Math.floor(Math.random()*list.length)];
  sendPrompt(random);
}

/* SHARE */
function share(){
  navigator.share ? 
    navigator.share({title:"Noctyxium AI", url:window.location.href}) :
    alert("Copy link: " + window.location.href);
}

/* DARK/LIGHT MODE */
function toggleMode(){
  if(document.body.style.background=="black"){
    document.body.style.background="#f5f6f7";
    document.body.style.color="#000";
  }else{
    document.body.style.background="black";
    document.body.style.color="#fff";
  }
}

</script>

</body>
</html>
