<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#0f1115;
  color:#e4e4e4;
}

/* NAVBAR */
.navbar{
  background:#12141a;
  padding:12px;
  border-bottom:1px solid #1f222b;
  display:flex;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{height:28px;}
.logo span{color:#ff3b3b;font-weight:bold;}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#12141a;
  border-right:1px solid #1f222b;
  padding:12px;
  overflow:auto;
}

.sidebar h2{
  margin-bottom:10px;
}

.sidebar h3{
  margin-top:10px;
  font-size:12px;
  color:#888;
}

/* PROMPTS */
.prompt{
  background:#1a1d25;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

.prompt:hover{
  background:#252a35;
  border:1px solid #ff3b3b;
}

/* CHAT */
.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:12px;
  text-align:center;
  border-bottom:1px solid #1f222b;
  color:#ff3b3b;
}

.top-actions{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.btn{
  padding:8px 12px;
  border-radius:6px;
  border:1px solid #333;
  background:#1a1d25;
  color:#ddd;
  cursor:pointer;
}

.btn:hover{
  border-color:#ff3b3b;
}

/* CHAT BOX */
.chat-box{
  flex:1;
  padding:10px;
  background:#0f1115;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none;}
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">
    <img src="logo.png">
    <span>Noctyxium AI</span>
  </div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h2>🎬 Explore Stories</h2>

<h3>🔥 Horror</h3>
<div class="prompt" onclick="copyPrompt('3AM mirror horror story cinematic')">Mirror Entity</div>
<div class="prompt" onclick="copyPrompt('ghost watching you in dark story')">Watcher</div>
<div class="prompt" onclick="copyPrompt('phone camera ghost story')">Camera Ghost</div>

<h3>🌲 Adventure</h3>
<div class="prompt" onclick="copyPrompt('lost jungle survival horror story')">Jungle Survival</div>
<div class="prompt" onclick="copyPrompt('temple treasure danger story')">Temple Danger</div>

<h3>🧠 Mystery</h3>
<div class="prompt" onclick="copyPrompt('time loop mystery story')">Time Loop</div>
<div class="prompt" onclick="copyPrompt('secret hidden room mystery')">Hidden Room</div>

<h3>🔪 Thriller</h3>
<div class="prompt" onclick="copyPrompt('unknown stalker thriller story')">Stalker</div>
<div class="prompt" onclick="copyPrompt('kidnap escape thriller')">Escape</div>

<h3>🚀 Sci-Fi</h3>
<div class="prompt" onclick="copyPrompt('AI becomes evil story')">Evil AI</div>
<div class="prompt" onclick="copyPrompt('alien controlling humans story')">Alien Signal</div>

<div class="prompt" onclick="randomPrompt()">🎲 Random Story</div>

</div>

<!-- CHAT -->
<div class="chat-area">

<div class="chat-header">
Generate cinematic stories instantly
</div>

<div class="top-actions">
<button class="btn" onclick="clearChat()">🗑 Clear Chat</button>
<button class="btn" onclick="share()">🔗 Share</button>
<button class="btn" onclick="alert('3AM Mode Activated 😈')">⏰ 3AM Mode</button>
</div>

<div class="chat-box" id="chat-container">
<iframe id="chatbot"
src="https://udify.app/chatbot/sr6l1agghqHaG7e9">
</iframe>
</div>

</div>

</div>

<script>

/* COPY */
function copyPrompt(text){
  navigator.clipboard.writeText(text);
  alert("Copied:\n"+text+"\nPaste in chat 👇");
}

/* RANDOM */
function randomPrompt(){
  const arr=[
    "dark forest horror story",
    "AI turning evil",
    "unknown shadow watching you",
    "3AM hospital horror",
    "alien invasion survival"
  ];
  copyPrompt(arr[Math.floor(Math.random()*arr.length)]);
}

/* ✅ FINAL CLEAR CHAT FIX */
function clearChat(){
  const container=document.getElementById("chat-container");

  container.innerHTML = `
    <iframe id="chatbot"
    src="https://udify.app/chatbot/sr6l1agghqHaG7e9?new=${Date.now()}"
    style="width:100%;height:100%;border:none;border-radius:10px;">
    </iframe>
  `;
}

/* SHARE */
function share(){
  if(navigator.share){
    navigator.share({title:"Noctyxium AI",url:window.location.href});
  }else{
    alert(window.location.href);
  }
}

</script>

</body>
</html>
