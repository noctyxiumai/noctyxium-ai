<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#0f1115;
  color:#e4e4e4;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar{
  background:#12141a;
  border-bottom:1px solid #1f222b;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

.logo span{color:#ff3b3b;font-weight:bold;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#12141a;
  padding:12px;
  transition:0.3s;
  z-index:1000;
  overflow:auto;
}

.sidebar.active{left:0;}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

.overlay.active{display:block;}

.prompt{
  background:#1a1d25;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  cursor:pointer;
}

.prompt:hover{
  background:#252a35;
  border:1px solid #ff3b3b;
}

/* CHAT */
.chat-header{
  text-align:center;
  color:#ff3b3b;
  padding:10px;
}

.top-actions{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  padding:8px 12px;
  border-radius:8px;
  background:#1a1d25;
  border:1px solid #333;
  cursor:pointer;
}

.chat-box{
  padding:10px;
  height:75vh;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><span>Noctyxium AI</span></div>
</div>

<div class="sidebar" id="sidebar">

<h2>🎬 Explore Stories</h2>

<div class="prompt" onclick="copyPrompt('3AM mirror entity horror story')">Mirror Entity</div>
<div class="prompt" onclick="copyPrompt('ghost in camera horror')">Camera Ghost</div>
<div class="prompt" onclick="copyPrompt('shadow watching you horror')">Watcher</div>

<div class="prompt" onclick="randomPrompt()">🎲 Random Story</div>

<h3>🔥 Netflix Ideas</h3>
<div id="ideas"></div>

<h3>📖 Blog</h3>
<div class="prompt" onclick="window.location.href='ai-horror-prompts.html'">100+ Prompts</div>

</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="chat-header">Generate cinematic stories instantly</div>

<div class="top-actions">
<button class="btn" onclick="clearChat()">🗑</button>
<button class="btn" onclick="share()">🔗</button>
</div>

<div class="chat-box">
<iframe id="chatbot" src="https://udify.app/chatbot/sr6l1agghqHaG7e9"></iframe>
</div>

<script>

/* MENU */
function toggleMenu(){
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}

/* COPY */
function copyPrompt(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

/* RANDOM */
function randomPrompt(){
  const arr=["3AM horror","ghost","AI horror","time loop"];
  copyPrompt(arr[Math.floor(Math.random()*arr.length)]);
}

/* CLEAR */
function clearChat(){
  chatbot.src = chatbot.src.split("?")[0] + "?reload=" + Date.now();
}

/* SHARE */
function share(){
  navigator.clipboard.writeText(location.href);
  alert("Link copied!");
}

/* ===================== */
/* 🎬 100 NETFLIX IDEAS */
/* ===================== */

const IDEAS = [
"3AM elevator stuck between worlds",
"AI predicting your death",
"mirror showing future corpse",
"ghost inside mobile phone",
"dark web horror livestream",
"hotel room changing reality",
"camera capturing invisible entity",
"shadow copying your actions",
"unknown call at 3AM",
"door opening to another dimension",

"dead person messaging you",
"AI controlling dreams",
"abandoned hospital alive",
"time loop where you die daily",
"mirror entity watching you sleep",
"haunted train never stopping",
"underground bunker horror",
"space station ghost",
"ghost in smart home AI",
"TV showing your death",

"creature mimicking humans",
"voice calling from darkness",
"camera recording future crime",
"AI becomes god",
"child ghost controlling house",
"night where sun never rises",
"door appearing randomly",
"phone hearing your thoughts",
"mirror breaking reality",
"room without exit",

"forest where people vanish",
"entity inside reflection",
"ghost in CCTV",
"AI reading your future",
"nightmare becoming real",
"unknown face in mirror",
"train going to death world",
"building with no exit",
"ghost writing messages",
"time glitch horror",

"shadow without body",
"AI controlling city",
"unknown app killing users",
"camera watching you back",
"dark room breathing",
"ghost in voice assistant",
"mirror pulling you inside",
"AI rewriting reality",
"door to nightmare world",
"unknown knocking at 3AM"
];

IDEAS.forEach(i=>{
  let d=document.createElement("div");
  d.className="prompt";
  d.innerText="🎬 "+i;
  d.onclick=function(){copyPrompt(i)};
  ideas.appendChild(d);
});

</script>

</body>
</html>
