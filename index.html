<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium Ultra Pro AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* HEADER */
.header{
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
background:#111;
color:#ff0033;
}

/* CHAT */
.chat{
height:40vh;
overflow:auto;
padding:10px;
}

.msg{
margin:10px;
padding:12px;
border-radius:12px;
max-width:80%;
}

.user{background:#ff0033;margin-left:auto;}
.bot{background:#1a1a1a;}

/* INPUT */
.input-box{
display:flex;
gap:5px;
padding:10px;
border-top:1px solid #222;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#111;
color:#fff;
}

button{
padding:10px;
background:#ff0033;
border:none;
border-radius:10px;
color:#fff;
cursor:pointer;
}

/* IDEAS */
.ideas{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
padding:10px;
height:20vh;
overflow:auto;
}

.idea{
padding:10px;
background:#111;
border-radius:10px;
cursor:pointer;
}

/* VIDEO */
#video{
height:30vh;
padding:10px;
}

#video img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🎬 Noctyxium Ultra Pro AI</div>

<div id="chat" class="chat"></div>

<div class="input-box">
<input id="input" placeholder="Enter horror idea...">
<button onclick="generate()">Generate</button>
<button onclick="speak()">🔊</button>
<button onclick="video()">🎬</button>
</div>

<div id="video"></div>

<div id="ideas" class="ideas"></div>

<script>
const API_KEY = "YOUR_GEMINI_API_KEY";

/* SYSTEM */
const SYSTEM = `
You are a Hollywood horror writer.

Rules:
- Cinematic horror
- 3AM scene
- Short paragraphs
- Dark tone
- Twist ending
`;

/* IDEAS */
const IDEAS = [
"3AM mirror entity",
"ghost inside phone",
"AI controlling dreams",
"shadow watching you",
"time loop horror",
"abandoned hospital",
"evil AI CCTV",
"haunted train"
];

const chat=document.getElementById("chat");

/* MESSAGE */
function addMsg(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

/* GENERATE */
async function generate(){
let input=document.getElementById("input");
let text=input.value.trim();
if(!text)return;

addMsg(text,"user");
input.value="";
addMsg("Generating...","bot");

try{
let res=await fetch(
"https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{
parts:[{text:SYSTEM+"\nIdea: "+text}]
}]
})
}
);

let data=await res.json();
chat.lastChild.remove();

let reply=data.candidates?.[0]?.content?.parts?.map(p=>p.text).join("")||"Error";

addMsg(reply,"bot");

}catch(e){
chat.lastChild.remove();
addMsg("API Error","bot");
}
}

/* VOICE */
function speak(){
let text=document.querySelector(".bot:last-child")?.innerText;
if(!text)return;

let speech=new SpeechSynthesisUtterance(text);
speech.rate=0.9;
speech.pitch=0.7;
speechSynthesis.speak(speech);
}

/* SPLIT SCENES */
function split(text){
return text.split(". ").slice(0,5);
}

/* IMAGE */
function img(q){
return "https://source.unsplash.com/800x500/?horror,"+q;
}

/* VIDEO */
function video(){
let text=document.querySelector(".bot:last-child")?.innerText;
if(!text)return;

let scenes=split(text);
let box=document.getElementById("video");

let i=0;

function show(){
if(i>=scenes.length)return;

let image=document.createElement("img");
image.src=img(scenes[i]);

box.innerHTML="";
box.appendChild(image);

i++;
setTimeout(show,2000);
}

show();
}

/* LOAD IDEAS */
const ideasDiv=document.getElementById("ideas");

IDEAS.forEach(i=>{
let d=document.createElement("div");
d.className="idea";
d.innerText=i;
d.onclick=()=>{
document.getElementById("input").value=i;
};
ideasDiv.appendChild(d);
});
</script>

</body>
</html>
