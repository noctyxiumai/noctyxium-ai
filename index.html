<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium AI</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family: Arial;
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* 🌫️ LIGHT FOG (SUBTLE) */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(255,255,255,0.03), transparent 70%);
  animation: fog 20s infinite linear;
  z-index:0;
}
@keyframes fog {
  0%{transform:translate(0,0)}
  50%{transform:translate(20px,20px)}
  100%{transform:translate(0,0)}
}

/* NAVBAR */
.navbar {
  position: sticky;
  top:0;
  background: rgba(0,0,0,0.85);
  padding: 12px;
  display:flex;
  justify-content: space-between;
  align-items:center;
  z-index:999;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo {
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:bold;
}

.logo img {
  height:32px;
}

.logo span {
  color:#ff3b3b;
}

/* NAV LINKS */
.navbar a {
  color:#ccc;
  margin:5px;
  padding:7px 12px;
  border:1px solid #222;
  border-radius:20px;
  transition:0.3s;
}

.navbar a:hover {
  background:#111;
  border-color:#ff2a2a;
  color:#fff;
}

/* TITLE */
.title {
  text-align:center;
  font-size:2rem;
  margin-top:40px;
  color:#ff3b3b;
  text-shadow:0 0 15px rgba(255,0,0,0.3);
}

/* HERO */
.hero {
  text-align:center;
  margin:20px;
}

.hero p {
  color:#bbb;
  margin-bottom:10px;
}

/* BUTTON */
.btn {
  padding:10px 18px;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  border-color:#ff2a2a;
  box-shadow:0 0 15px rgba(255,0,0,0.2);
}

/* CARDS */
.card {
  background:#111;
  margin:12px;
  padding:15px;
  border-radius:12px;
  border:1px solid #222;
  transition:0.3s;
}

.card:hover {
  border-color:#ff2a2a;
  box-shadow:0 0 15px rgba(255,0,0,0.15);
}

/* CHAT */
iframe {
  width:100%;
  height:650px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

/* CHAT HEADING */
.chat-heading {
  text-align:center;
  margin-top:20px;
  color:#ff3b3b;
}

/* PROMPT TEXT */
.prompt-text {
  text-align:center;
  color:#888;
  font-size:0.9rem;
  margin-bottom:10px;
}

/* MOBILE */
@media(max-width:768px){
  .title {font-size:1.5rem;}
  iframe {height:550px;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="logo.png">
    <span>Noctyxium AI</span>
  </div>
  <div>
    <a href="#">Home</a>
    <a href="#chat">AI</a>
    <a href="#">About</a>
  </div>
</div>

<!-- TITLE -->
<h1 class="title">NOCTYXIUM AI HORROR</h1>

<!-- HERO -->
<div class="hero">
  <p>Type your fear... if you dare.</p>
  <button class="btn" onclick="scrollToChat()">Try Horror AI</button>
</div>

<!-- FEATURES -->
<div class="card">🎬 Cinematic horror stories</div>
<div class="card">🌍 Multi-language AI</div>
<div class="card">😈 3AM Fear Mode</div>

<!-- CHAT -->
<div id="chat" style="margin:20px;">
  
  <h2 class="chat-heading">Ask your story...</h2>
  
  <p class="prompt-text">
    Try: "3AM horror story", "ghost in hospital", "haunted village"
  </p>

  <iframe src="https://udify.app/chatbot/sr6l1agghqHaG7e9"></iframe>
</div>

<script>
function scrollToChat(){
  document.getElementById("chat").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
