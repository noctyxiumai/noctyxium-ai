<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noctyxium AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#0f1115;
  color:#e4e4e4;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar{
  background:#12141a;
  border-bottom:1px solid #1f222b;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

.logo span{color:#ff3b3b;font-weight:bold;}

/* SLIDE SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#12141a;
  padding:12px;
  transition:0.3s;
  z-index:1000;
  overflow:auto;
}

.sidebar.active{
  left:0;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

.overlay.active{
  display:block;
}

/* PROMPTS */
.prompt{
  background:#1a1d25;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.prompt:hover{
  background:#252a35;
  border:1px solid #ff3b3b;
}

/* CHAT */
.chat-area{
  padding-top:10px;
}

.chat-header{
  text-align:center;
  color:#ff3b3b;
  padding:10px;
}

.top-actions{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  padding:8px 12px;
  border-radius:8px;
  background:#1a1d25;
  border:1px solid #333;
  cursor:pointer;
}

.btn:hover{
  border-color:#ff3b3b;
}

/* CHAT BOX */
.chat-box{
  padding:10px;
  height:75vh;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* ANIMATION */
.sidebar.active{
  animation:slideIn 0.3s ease;
}

@keyframes slideIn{
  from{left:-260px;}
  to{left:0;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo"><span>Noctyxium AI</span></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h2>🎬 Explore Stories</h2>

<div class="prompt" onclick="copyPrompt('3AM mirror entity horror story')">Mirror Entity</div>
<div class="prompt" onclick="copyPrompt('ghost in camera horror')">Camera Ghost</div>
<div class="prompt" onclick="copyPrompt('shadow watching you horror')">Watcher</div>

<div class="prompt" onclick="randomPrompt()">🎲 Random Story</div>

<h3>📖 Blog</h3>
<div class="prompt" onclick="window.location.href='ai-horror-prompts.html'">100+ Prompts</div>

</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- CHAT -->
<div class="chat-area">

<div class="chat-header">
Generate cinematic stories instantly
</div>

<div class="top-actions">
<button class="btn" onclick="clearChat()">🗑</button>
<button class="btn" onclick="share()">🔗</button>
<button class="btn" onclick="alert('3AM Mode 😈')">⏰</button>
</div>

<div class="chat-box">
<iframe id="chatbot" src="https://udify.app/chatbot/sr6l1agghqHaG7e9"></iframe>
</div>

</div>

<script>

/* MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

/* COPY */
function copyPrompt(text){
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

/* RANDOM */
function randomPrompt(){
  const arr=[
    "3AM horror hospital",
    "ghost calling your name",
    "AI gone evil",
    "time loop horror"
  ];
  copyPrompt(arr[Math.floor(Math.random()*arr.length)]);
}

/* CLEAR */
function clearChat(){
  let iframe=document.getElementById("chatbot");
  iframe.src = iframe.src + "?reload=" + new Date().getTime();
}

/* SHARE */
function share(){
  if(navigator.share){
    navigator.share({title:"Noctyxium AI",url:location.href});
  }else{
    alert("Copy link:\n"+location.href);
  }
}
<script>

// ==========================
// TRENDING + AI SYSTEM
// ==========================

const TRENDING = [
"3AM elevator stuck between floors",
"dark web live ghost stream",
"AI predicting your death time",
"mirror showing future corpse",
"unknown number calling at 3AM",
"camera capturing invisible entity",
"room where time doesn't move",
"door that shouldn't exist",
"shadow mimicking your actions",
"TV showing your future death"
];

// LOAD TRENDING
const trendingDiv = document.getElementById("trending");

TRENDING.forEach(i=>{
  let d=document.createElement("div");
  d.className="prompt";
  d.innerText="🔥 "+i;
  d.onclick=()=>copyPrompt(i);
  trendingDiv.appendChild(d);
});

// ==========================
// AI AUTO IDEA GENERATOR
// ==========================

const API_KEY = "PASTE_YOUR_GEMINI_API_KEY";

async function generateIdeas(){

  try{
    let res = await fetch(
      "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key="+API_KEY,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents:[{
            parts:[{
              text:`Generate 10 short Netflix-level horror story ideas.
              Use dark, 3AM, AI, ghost, thriller themes.
              Only give ideas in 1 line each.`
            }]
          }]
        })
      }
    );

    let data = await res.json();

    let text = data.candidates[0].content.parts[0].text;

    let ideas = text.split("\n").filter(x=>x.trim());

    showAIIdeas(ideas);

  }catch(e){
    console.log("AI error");
  }
}

// SHOW AI IDEAS
function showAIIdeas(list){
  const aiDiv = document.getElementById("aiIdeas");
  aiDiv.innerHTML="";

  list.forEach(i=>{
    let d=document.createElement("div");
    d.className="prompt";
    d.innerText="🤖 "+i;
    d.onclick=()=>copyPrompt(i);
    aiDiv.appendChild(d);
  });
}

// AUTO LOAD DAILY
generateIdeas();

// ==========================
// VIRAL SYSTEM
// ==========================

function boostViral(){
  let all = document.querySelectorAll(".prompt");

  all.forEach((el,i)=>{
    if(i % 5 === 0){
      el.style.border="1px solid red";
      el.style.boxShadow="0 0 10px red";
    }
  });
}

setTimeout(boostViral,2000);

</script>
  
</script>

</body>
</html>
